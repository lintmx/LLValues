<head>
    <meta charset="utf-8">
    <title>LoveLiveValues Feedback</title>


    <link href='style.css' rel='stylesheet' type='text/css'>
    <link rel="icon" type="x-icon" href="icon.png">
    <link rel="shortcut icon" type="x-icon" href="icon.png">
    <script src="i18n.js"></script>
    <script type="application/javascript" src="questions_feedback.js"></script>
    <script type="application/javascript" src="questions_feedback_ja.js"></script>
    <script type="application/javascript" src="questions_feedback_zh_cn.js"></script>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>


	<h1 class="title">LoveLiveValues</h1>
    <svg id="svgHeader" style="width: 100%;" viewBox="0 0 112 19">
		<text x="50%" y="15" class="svgHeader">LoveLiveValues</text>
	</svg>
<hr>

<h2 style="text-align:center;" id="question-number" data-i18n="all_done">All done!</h2>
<p class="question" id="question-text" data-i18n="feedback_initial_question">Did you complete this test in a serious (or at least unironic) manner?</p>
<div id="answers">
    <button class="button" onclick="pass()" style="background-color: #4caf50;" data-i18n="see_results">See my results!</button> <br>
    <button class="button" id="quiz" onclick="location.href='quiz.html';" style="background-color: #4caf50; display: none;" data-i18n="do_quiz">Do the quiz!</button> <br>
</div>
<button class="small_button" onclick="prev_question()" id="back_button" style="display: none;" data-i18n="back">Back</button>
<button class="small_button_off" id="back_button_off" style="display: none;" data-i18n="back">Back</button><br>

<!-- Test JS -->
<script>

    // Declare previous answers
    var testAnswers, testPercentages;
    try {
        testAnswers = JSON.parse(window.sessionStorage.answers);
        testPercentages = JSON.parse(window.sessionStorage.percentages);
    } catch(err) {
        testAnswers = {};
        testPercentages = {};
    }

    if (Object.keys(testAnswers).length === 0) {
        document.getElementById("quiz").style.display = "";
    }

    // init variables
    var answers = {};
    var qn = 0;

    // Populate questionsObject
    var questionsObject = {};
    questions.forEach(function(value) {
        questionsObject[value['id']] = value;
    });

    var questionsOrder = Object.keys(questionsObject);

    applyTranslations();

    // Init question
    function init_question() {
        if (Object.keys(testAnswers).length === 0) {
            location.href = 'quiz.html';
        }
        var current = questionsObject[questionsOrder[qn]];
        var qId = questionsOrder[qn];
        var answersDiv = document.getElementById("answers");

        var qText = current.question;
        if (getLang() === 'ja' && questions_feedback_ja && questions_feedback_ja[qId] && questions_feedback_ja[qId].question) {
            qText = questions_feedback_ja[qId].question;
        } else if (getLang() === 'zh-CN' && questions_feedback_zh_cn && questions_feedback_zh_cn[qId] && questions_feedback_zh_cn[qId].question) {
            qText = questions_feedback_zh_cn[qId].question;
        }
        document.getElementById("question-text").innerHTML = qText;
        document.getElementById("question-number").innerHTML = t("question_n_of_m", {n: qn + 1, m: questionsOrder.length});

        answersDiv.innerHTML = "";

        if (current.questionType === "smallSelection") {
            current.answers.forEach(createButton);

        } else if (current.questionType === "bigSelection") {
            var select = document.createElement("select");
            select.id = "select";
            select.className = "selection";
            var defaultOpt = document.createElement("option");
            defaultOpt.value = "null";
            defaultOpt.disabled = true;
            defaultOpt.selected = true;
            defaultOpt.textContent = t("click_to_choose");
            select.appendChild(defaultOpt);

            for (var key in current.answers) {
                var opt = document.createElement("option");
                opt.value = key;
                opt.textContent = current.answers[key];
                select.appendChild(opt);
            }
            answersDiv.appendChild(select);
            answersDiv.appendChild(document.createElement("br"));

            var goBtn = document.createElement("button");
            goBtn.className = "button";
            goBtn.id = "go";
            goBtn.onclick = function() { next_question(getActiveDropdown()); };
            goBtn.style.backgroundColor = "#4caf50";
            goBtn.style.display = "none";
            goBtn.textContent = t("go_button");
            answersDiv.appendChild(goBtn);
            answersDiv.appendChild(document.createElement("br"));
            createButton({"label":t("refuse"),"color":"#a9a9a9","effect":null});

            select.addEventListener("change", function() {
                document.getElementById("go").style.display = "";
            });

        } else if (current.questionType === "customNumber") {
            var numInput = document.createElement("input");
            numInput.type = "tel";
            numInput.id = "number";
            numInput.className = "num_input";
            numInput.maxLength = current.range[1].toString().length;
            numInput.min = current.range[0];
            numInput.max = current.range[1];
            answersDiv.appendChild(numInput);
            answersDiv.appendChild(document.createElement("br"));

            var goBtn = document.createElement("button");
            goBtn.disabled = true;
            goBtn.className = "button green_button";
            goBtn.id = "go";
            goBtn.onclick = function() { next_question(getActiveNumber()); };
            goBtn.textContent = t("next_button");
            answersDiv.appendChild(goBtn);
            answersDiv.appendChild(document.createElement("br"));
            createButton({"label":t("refuse"),"color":"#a9a9a9","effect":null});

            numInput.addEventListener("input", function() {
                var nr = Number(getActiveNumber());
                document.getElementById("go").disabled = !(current.range[0] <= nr && nr <= current.range[1]);
            });
            numInput.focus();

        } else if (current.questionType === "customText") {
            var textInput = document.createElement("input");
            textInput.type = "text";
            textInput.id = "text";
            textInput.className = "text_input";
            answersDiv.appendChild(textInput);
            answersDiv.appendChild(document.createElement("br"));

            var goBtn = document.createElement("button");
            goBtn.disabled = true;
            goBtn.className = "button green_button";
            goBtn.id = "go";
            goBtn.onclick = function() { next_question(getActiveText()); };
            goBtn.textContent = t("next_button");
            answersDiv.appendChild(goBtn);
            answersDiv.appendChild(document.createElement("br"));
            createButton({"label":t("refuse_dont_know"),"color":"#a9a9a9","effect":null});

            textInput.addEventListener("input", function() {
                document.getElementById("go").disabled = getActiveText().length === 0;
            });
            textInput.focus();
        }

        if (Object.keys(answers).length === 0) {
            document.getElementById("back_button").style.display = "none";
            document.getElementById("back_button_off").style.display = "";
        } else {
            document.getElementById("back_button").style.display = "";
            document.getElementById("back_button_off").style.display = "none";
        }
    }


    // Next question
    function next_question(answer) {
        if (qn === questionsOrder.length) return;
        answers[questionsOrder[qn]] = answer;
        qn++;
        if (qn < questionsOrder.length) {
            init_question();
        } else {
            pass();
        }
    }


    // Previous question
    function prev_question() {
        if (Object.keys(answers).length === 0) {
            document.getElementById("back_button").style.display = "none";
            document.getElementById("back_button_off").style.display = "";
            return;
        }
        qn--;
        delete answers[questionsOrder[qn]];
        init_question();
    }


    // Helper functions
    function createButton(buttonInfo) {
        var btn = document.createElement("button");
        btn.className = "button";
        btn.style.backgroundColor = buttonInfo["color"];
        var label = buttonInfo["label"];
        var qId = questionsOrder[qn];
        if (getLang() === 'ja' && questions_feedback_ja && questions_feedback_ja[qId] && questions_feedback_ja[qId].answers && questions_feedback_ja[qId].answers[label]) {
            label = questions_feedback_ja[qId].answers[label];
        } else if (getLang() === 'zh-CN' && questions_feedback_zh_cn && questions_feedback_zh_cn[qId] && questions_feedback_zh_cn[qId].answers && questions_feedback_zh_cn[qId].answers[label]) {
            label = questions_feedback_zh_cn[qId].answers[label];
        }
        btn.textContent = label;
        if (buttonInfo["effect"] === null || Number.isInteger(buttonInfo["effect"])) {
            btn.onclick = function() { next_question(buttonInfo["effect"]); };
        } else {
            btn.onclick = function() { next_question(buttonInfo["effect"]); };
        }
        var answersDiv = document.getElementById("answers");
        answersDiv.appendChild(btn);
        answersDiv.appendChild(document.createElement("br"));
    }

    function getActiveDropdown() {
        return document.getElementById("select").value;
    }

    function getActiveNumber() {
        return document.getElementById("number").value;
    }

    function getActiveText() {
        return document.getElementById("text").value;
    }

    function pass() {
        location.href = 'results.html?' + window.location.search.substring(1);
    }

</script>
</body>
