<head>
    <link href='style.css' rel='stylesheet' type='text/css'>
    <title>LoveLiveValues Results</title>
    <link rel="icon" type="x-icon" href="icon.png">
    <link rel="shortcut icon" type="x-icon" href="icon.png">
    <meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    
    <body>
    <h1 class="title">LoveLiveValues</h1>
    <svg id="svgHeader" style="width: 100%;" viewBox="0 0 112 19">
        <text x="50%" y="15" class="svgHeader">LoveLiveValues</text>
    </svg>
    <hr>
    
	<h1 class="title">Results</h1>
    <svg id="svgHeader" style="width: 100%;" viewBox="0 0 112 19">
		<text x="50%" y="15" class="svgHeader">Results</text>
	</svg>
    
    <img src="" id="banner" style="max-width:70%;height:auto;display:block;margin:0 auto"></canvas></br>
    <p style="text-align:center;margin:-2px auto">Hint: you can download this image directly. No need to screenshot!</p></br>
    <button class="button" onclick="location.href='index.html';" style="background-color: #2196f3;">Back</button> <br>
	
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        x_axis  = parseFloat(urlParams.get("degenerate"))
        y_axis  = parseFloat(urlParams.get("yakkai"))
        window.onload = function() {
            var background = new Image();
            background.onload = function() {
                var c = document.createElement("canvas");
                c.width = 1850;
                c.height = 1500;
                var ctx = c.getContext("2d");
                ctx.fillStyle = "#EEEEEE"
                ctx.fillRect(0, 0, 1850, 1500);
                ctx.drawImage(background, 0, 0);
    
                var dot = c.getContext("2d");
                dot.beginPath();
                dot.arc(437 + (1000 * (x_axis+10)/20), 1146 - (1000 * (y_axis + 10)/20), 25, 0, 2 * Math.PI);
                dot.fillStyle = 'red';
                dot.fill();
                dot.stroke();
    
                ctx.font="50px Montserrat"
                ctx.textAlign="center"
                ctx.fillStyle="#222222"
                ctx.fillText("Degenerate / Civilzed Axis (x): " + x_axis, 725, 1350)
                ctx.fillText("Yakkai / Boring Axis (y): " + y_axis, 725, 1420)
                ctx.textAlign="right"
                ctx.font="60px Montserrat"
                ctx.fillText("LoveLiveValues.github.io", 1820, 1470)
    
                try {
                    document.getElementById("banner").src = c.toDataURL();
                } catch (e) {
                    // file:// protocol taints canvas; show canvas directly instead
                    var banner = document.getElementById("banner");
                    banner.parentNode.replaceChild(c, banner);
                    c.style.maxWidth = "70%";
                    c.style.height = "auto";
                    c.style.display = "block";
                    c.style.margin = "0 auto";
                }
            }
            background.src = "./compass2.png";
        }
        </script>
    </body>
