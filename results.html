<head>
    <link href='style.css' rel='stylesheet' type='text/css'>
    <title>LoveLiveValues Results</title>
    <link rel="icon" type="x-icon" href="icon.png">
    <link rel="shortcut icon" type="x-icon" href="icon.png">
    <meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="i18n.js"></script>
    <script src="config.js"></script>
    </head>

    <body>
    <h1 class="title">LoveLiveValues</h1>
    <svg id="svgHeader" style="width: 100%;" viewBox="0 0 112 19">
        <text x="50%" y="15" class="svgHeader">LoveLiveValues</text>
    </svg>
    <hr>

	<h1 class="title" data-i18n="results_title">Results</h1>
    <svg id="svgHeader" style="width: 100%;" viewBox="0 0 112 19">
		<text x="50%" y="15" class="svgHeader" data-i18n="results_title">Results</text>
	</svg>

    <div id="shareSection" style="display:none; text-align:center; margin-top:16px;">
        <p style="font-size:14pt; color:#555;" data-i18n="enter_nickname">Enter a nickname to see your results</p>
        <input type="text" id="nicknameInput" maxlength="30" data-i18n-placeholder="nickname_placeholder" placeholder="Nickname (required)"
            style="font-family:system-ui,sans-serif; font-size:16pt; padding:8pt; border:2px solid #888; border-radius:8pt; width:300px; max-width:80%; text-align:center; margin:8px auto; display:block;">
        <p id="nicknameError" style="font-size:12pt; color:#e53935; min-height:18px;"></p>
        <button id="shareBtn" class="button green_button" style="margin-top:8px;" data-i18n="submit">Submit</button>
        <p id="shareStatus" style="font-size:14pt; color:#555; min-height:20px;"></p>
    </div>

    <div id="resultsSection" style="display:none;">
        <img src="" id="banner" style="max-width:70%;height:auto;display:block;margin:0 auto"></canvas></br>
        <p style="text-align:center;margin:-2px auto" data-i18n="hint_download">Hint: you can download this image directly. No need to screenshot!</p>
        <p style="text-align:center;margin:4px auto;font-size:12pt;color:#777;" data-i18n="hint_twitter_image">To share the image on X/Twitter, download it first and attach it manually to your tweet.</p></br>
        <button class="button" onclick="location.href='index.html';" style="background-color: #2196f3;" data-i18n="results_back">Back</button> <br>
        <button class="button" onclick="location.href='explore.html';" style="background-color: #9c27b0; margin-top:8px;" id="exploreBtn" data-i18n="results_explore">Explore Community Results</button> <br>
        <button class="button" id="twitterShareBtn" style="background-color: #000000; margin-top:8px;" data-i18n="share_twitter">Share to X</button> <br>
    </div>


    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const rawDegenerate = parseFloat(urlParams.get("degenerate"));
        const rawYakkai = parseFloat(urlParams.get("yakkai"));
        x_axis  = -rawDegenerate;
        y_axis  = rawYakkai;
        window.onload = function() {
            injectLangToggle();
            applyTranslations();
            var background = new Image();
            background.onload = function() {
                var c = document.createElement("canvas");
                c.width = 1850;
                c.height = 1500;
                var ctx = c.getContext("2d");
                ctx.fillStyle = "#EEEEEE"
                ctx.fillRect(0, 0, 1850, 1500);
                ctx.drawImage(background, 0, 0);

                var dot = c.getContext("2d");
                dot.beginPath();
                dot.arc(437 + (1000 * (x_axis+10)/20), 1146 - (1000 * (y_axis + 10)/20), 25, 0, 2 * Math.PI);
                dot.fillStyle = 'red';
                dot.fill();
                dot.stroke();

                ctx.font="50px Montserrat"
                ctx.textAlign="center"
                ctx.fillStyle="#222222"
                ctx.fillText(t("compass_x_axis") + x_axis, 725, 1350)
                ctx.fillText(t("compass_y_axis") + y_axis, 725, 1420)
                ctx.textAlign="right"
                ctx.font="60px Montserrat"
                ctx.fillText("https://eyalmazuz.github.io/LLValues/", 1820, 1470)

                try {
                    document.getElementById("banner").src = c.toDataURL();
                } catch (e) {
                    // file:// protocol taints canvas; show canvas directly instead
                    var banner = document.getElementById("banner");
                    banner.parentNode.replaceChild(c, banner);
                    c.style.maxWidth = "70%";
                    c.style.height = "auto";
                    c.style.display = "block";
                    c.style.margin = "0 auto";
                }
            }
            background.src = getLang() === 'ja' ? './compass_ja.png' : './compass.png';

            // Share section logic
            function showResults() {
                document.getElementById("shareSection").style.display = "none";
                document.getElementById("resultsSection").style.display = "block";
            }

            document.getElementById("twitterShareBtn").addEventListener("click", function() {
                var text = t("share_tweet_text", {x: x_axis, y: y_axis});
                var url = "https://eyalmazuz.github.io/LLValues/";
                var twitterUrl = "https://twitter.com/intent/tweet?text=" + encodeURIComponent(text) + "&url=" + encodeURIComponent(url) + "&hashtags=" + encodeURIComponent("LoveLiveValues");
                window.open(twitterUrl, "_blank");
            });

            if (!isNaN(rawDegenerate) && !isNaN(rawYakkai)) {
                var shareKey = "shared_" + rawDegenerate + "_" + rawYakkai;
                if (sessionStorage.getItem(shareKey)) {
                    // Already submitted — show results directly
                    showResults();
                } else {
                    document.getElementById("shareSection").style.display = "block";
                }

                // Clear error on typing
                document.getElementById("nicknameInput").addEventListener("input", function() {
                    document.getElementById("nicknameError").textContent = "";
                });

                document.getElementById("shareBtn").addEventListener("click", function() {
                    var btn = this;
                    var status = document.getElementById("shareStatus");
                    var nicknameInput = document.getElementById("nicknameInput");
                    var nickname = nicknameInput.value.trim().substring(0, 30);

                    if (!nickname) {
                        document.getElementById("nicknameError").textContent = t("nickname_error");
                        nicknameInput.focus();
                        return;
                    }

                    var sessionId = sessionStorage.getItem("llv_session_id");
                    if (!sessionId) {
                        sessionId = Math.random().toString(36).substring(2) + Date.now().toString(36);
                        sessionStorage.setItem("llv_session_id", sessionId);
                    }

                    btn.disabled = true;
                    status.textContent = t("submitting");
                    status.style.color = "#555";

                    if (SHARE_CONFIG.enabled) {
                        fetch(SHARE_CONFIG.appsScriptUrl, {
                            method: "POST",
                            redirect: "follow",
                            headers: { "Content-Type": "text/plain" },
                            body: JSON.stringify({
                                degenerate: rawDegenerate,
                                yakkai: rawYakkai,
                                nickname: nickname,
                                sessionId: sessionId
                            })
                        })
                        .then(function(res) { return res.json(); })
                        .then(function(data) {
                            if (data.status === "ok") {
                                sessionStorage.setItem(shareKey, "1");
                                showResults();
                            } else {
                                status.textContent = data.message || "Something went wrong.";
                                status.style.color = "#e53935";
                                btn.disabled = false;
                            }
                        })
                        .catch(function() {
                            status.textContent = t("network_error");
                            status.style.color = "#e53935";
                            btn.disabled = false;
                        });
                    } else {
                        sessionStorage.setItem(shareKey, "1");
                        showResults();
                    }
                });
            }
        }
        </script>
    </body>
